<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" role="img" aria-label="ChestSort icon">
  <defs>
    <linearGradient id="wood" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#9A6A3A"/>
      <stop offset="1" stop-color="#6F4523"/>
    </linearGradient>
    <linearGradient id="lid" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#B07A44"/>
      <stop offset="1" stop-color="#7E522A"/>
    </linearGradient>
    <linearGradient id="metal" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#F2D27A"/>
      <stop offset="1" stop-color="#B9892E"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect x="16" y="16" width="224" height="224" rx="28" fill="#1E1E1E"/>

  <!-- Chest body -->
  <g transform="translate(0,2)">
    <rect x="52" y="116" width="152" height="92" rx="12" fill="url(#wood)" stroke="#2A1A0E" stroke-width="6"/>
    <rect x="52" y="92" width="152" height="48" rx="12" fill="url(#lid)" stroke="#2A1A0E" stroke-width="6"/>

    <!-- Separation line -->
    <path d="M58 140H198" stroke="#2A1A0E" stroke-width="6" stroke-linecap="round"/>

    <!-- Lock plate -->
    <rect x="112" y="132" width="32" height="44" rx="8" fill="url(#metal)" stroke="#2A1A0E" stroke-width="6"/>
    <rect x="120" y="148" width="16" height="18" rx="6" fill="#2A1A0E" opacity="0.55"/>

    <!-- Simple wood slats -->
    <path d="M82 116V208" stroke="#2A1A0E" stroke-width="6" opacity="0.35"/>
    <path d="M128 92V208" stroke="#2A1A0E" stroke-width="6" opacity="0.35"/>
    <path d="M174 116V208" stroke="#2A1A0E" stroke-width="6" opacity="0.35"/>
  </g>

  <!-- Sort arrows (overlay) -->
  <g fill="none" stroke-linecap="round" stroke-linejoin="round" stroke-width="10">
    <!-- Down-right arrow -->
    <path d="M78 64H162" stroke="#6EE7FF"/>
    <path d="M162 64V88" stroke="#6EE7FF"/>
    <path d="M162 88L184 72" stroke="#6EE7FF"/>

    <!-- Up-left arrow -->
    <path d="M178 48H94" stroke="#A7F3D0"/>
    <path d="M94 48V24" stroke="#A7F3D0"/>
    <path d="M94 24L72 40" stroke="#A7F3D0"/>
  </g>
</svg>
